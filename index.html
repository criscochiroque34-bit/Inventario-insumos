<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Inventario Logística</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.23.0/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f0f;--bg2:#161616;--bg3:#1e1e1e;--bg4:#272727;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --text:#f0f0f0;--text2:#999;--text3:#555;
  --green:#00c97d;--green-dim:rgba(0,201,125,0.12);
  --amber:#f0a500;--amber-dim:rgba(240,165,0,0.12);
  --red:#ff5050;--red-dim:rgba(255,80,80,0.12);
  --blue:#4d9eff;--blue-dim:rgba(77,158,255,0.1);
  --radius:10px;--radius-sm:6px;
}
html,body,#root{height:100%}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:2px}
input,select{font-family:'DM Sans',sans-serif;font-size:13px;background:var(--bg3);border:1px solid var(--border2);color:var(--text);border-radius:var(--radius-sm);padding:7px 10px;outline:none;transition:border-color .15s;width:100%}
input:focus,select:focus{border-color:var(--green)}
select option{background:var(--bg3)}
button{font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;border:none;outline:none;border-radius:var(--radius-sm);transition:all .15s}
/* AUTH */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:1rem}
.auth-card{width:100%;max-width:380px;background:var(--bg2);border:1px solid var(--border2);border-radius:16px;padding:2rem}
.auth-logo{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:2rem}
.auth-logo-icon{font-size:24px;color:var(--green)}
.auth-logo-name{font-size:18px;font-weight:500}
.auth-title{font-size:20px;font-weight:500;text-align:center;margin-bottom:6px}
.auth-sub{font-size:12px;color:var(--text2);text-align:center;margin-bottom:1.5rem}
.auth-field{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.auth-field label{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--text2)}
.auth-btn{width:100%;height:42px;background:var(--green);color:#000;font-weight:600;border-radius:8px;font-size:14px;margin-top:8px}
.auth-btn:hover{opacity:.9}
.auth-btn:disabled{opacity:.5;cursor:not-allowed}
.auth-divider{display:flex;align-items:center;gap:8px;margin:1rem 0}
.auth-divider-line{flex:1;height:1px;background:var(--border)}
.auth-divider-text{font-size:11px;color:var(--text3)}
.auth-link-btn{width:100%;height:38px;background:transparent;color:var(--text2);border:1px solid var(--border2);border-radius:8px;font-size:13px}
.auth-link-btn:hover{background:var(--bg3);color:var(--text)}
.auth-switch{text-align:center;font-size:12px;color:var(--text3);margin-top:1rem}
.auth-switch span{color:var(--green);cursor:pointer}
.auth-switch span:hover{text-decoration:underline}
.auth-err{background:var(--red-dim);color:var(--red);border:1px solid rgba(255,80,80,.2);border-radius:var(--radius-sm);padding:8px 12px;font-size:12px;margin-bottom:1rem}
.auth-ok{background:var(--green-dim);color:var(--green);border:1px solid rgba(0,201,125,.2);border-radius:var(--radius-sm);padding:8px 12px;font-size:12px;margin-bottom:1rem}
/* PENDING */
.pending-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:1rem}
.pending-card{width:100%;max-width:380px;background:var(--bg2);border:1px solid var(--border2);border-radius:16px;padding:2rem;text-align:center}
.pending-icon{font-size:48px;display:block;margin-bottom:1rem}
.pending-title{font-size:18px;font-weight:500;margin-bottom:8px}
.pending-badge{display:inline-flex;align-items:center;gap:6px;background:var(--amber-dim);color:var(--amber);font-size:11px;font-weight:500;padding:6px 14px;border-radius:99px;margin-bottom:1rem}
.pending-dot{width:6px;height:6px;border-radius:50%;background:var(--amber)}
.pending-sub{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:1.5rem}
.pending-info{background:var(--bg3);border-radius:8px;padding:12px;font-size:12px;color:var(--text3);line-height:1.7;text-align:left}
.pending-info strong{color:var(--text2)}
.pending-logout{margin-top:1.5rem;background:transparent;color:var(--text3);font-size:12px;border:1px solid var(--border);padding:6px 16px;border-radius:var(--radius-sm)}
.pending-logout:hover{color:var(--text);background:var(--bg3)}
/* APP LAYOUT */
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:200px;min-width:200px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column}
.brand{display:flex;align-items:center;gap:10px;padding:1.25rem;border-bottom:1px solid var(--border)}
.brand-icon{font-size:20px;color:var(--green)}.brand-name{font-size:15px;font-weight:500}
.nav{display:flex;flex-direction:column;gap:2px;padding:.75rem .5rem;flex:1}
.nav-btn{display:flex;align-items:center;gap:9px;padding:8px 12px;border-radius:var(--radius-sm);background:transparent;color:var(--text2);font-size:13px;text-align:left;width:100%}
.nav-btn:hover{background:var(--bg3);color:var(--text)}
.nav-btn.active{background:var(--bg4);color:var(--text);font-weight:500}
.nav-icon{font-size:15px;width:18px;text-align:center;flex-shrink:0}
.nbadge{margin-left:auto;background:var(--red);color:#fff;font-size:10px;font-weight:600;padding:1px 6px;border-radius:99px}
.sidebar-foot{padding:.75rem .5rem 1rem;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:6px}
.bexp{width:100%;padding:8px 12px;background:transparent;color:var(--text3);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:12px;text-align:left}
.bexp:hover{background:var(--bg3);color:var(--text2)}
.user-info{padding:6px 12px;font-size:11px;color:var(--text3);display:flex;align-items:center;gap:6px}
.user-dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0}
.main{flex:1;overflow-y:auto;background:var(--bg)}
.bottom-nav{display:none}
/* PAGES */
.page{padding:1.5rem;max-width:1100px}
.ph{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1.5rem}
.pt{font-size:22px;font-weight:500}.ps{font-size:13px;color:var(--text2);margin-top:3px}
.metrics{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:1.5rem}
.metrics3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-bottom:1.25rem}
.metric{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:1rem 1.25rem;display:flex;flex-direction:column;gap:6px}
.ml{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--text2)}
.mv{font-size:28px;font-weight:500}
.cr{color:var(--red)!important}.ca{color:var(--amber)!important}.cg{color:var(--green)!important}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:1rem}
.card-red{border-left:3px solid var(--red);background:linear-gradient(90deg,rgba(255,80,80,.04),var(--bg2) 40%)}
.card-amber{border-left:3px solid var(--amber);background:linear-gradient(90deg,rgba(240,165,0,.04),var(--bg2) 40%)}
.section{margin-bottom:1.5rem}
.stitle{font-size:12px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.75rem;display:flex;align-items:center;gap:8px}
.sdot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.alert-list{display:flex;flex-direction:column;gap:8px}
.atop{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:3px}
.aname{font-size:14px;font-weight:500}
.acode{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;display:block;margin-bottom:8px}
.astats{display:flex;gap:1.5rem;font-size:12px;color:var(--text2);margin-bottom:8px}
.astats strong{color:var(--text);font-weight:500}
.dbadge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:99px;white-space:nowrap}
.dbadge.r{background:var(--red-dim);color:var(--red)}.dbadge.a{background:var(--amber-dim);color:var(--amber)}.dbadge.g{background:var(--green-dim);color:var(--green)}
.badge{font-size:11px;font-weight:500;padding:3px 10px;border-radius:99px;display:inline-block}
.badge.critico{background:var(--red-dim);color:var(--red)}.badge.alerta{background:var(--amber-dim);color:var(--amber)}.badge.stock{background:var(--green-dim);color:var(--green)}
.bwrap{height:4px;background:var(--bg4);border-radius:99px;overflow:hidden}
.bfill{height:100%;border-radius:99px}
.cbtn{display:flex;align-items:center;gap:8px;background:var(--green);color:#000;font-weight:600;padding:10px 18px;border-radius:var(--radius);font-size:14px;width:100%}
.cbtn:hover{opacity:.9}
.ccard{background:var(--bg2);border:1px solid var(--border2);border-radius:0 0 var(--radius) var(--radius);padding:1rem;margin-bottom:1.5rem}
.chead{display:grid;grid-template-columns:2fr 80px 60px 80px;padding:6px 8px;background:var(--bg3);border-radius:var(--radius-sm);font-size:10px;text-transform:uppercase;color:var(--text3);gap:8px;margin-bottom:4px}
.crow{display:grid;grid-template-columns:2fr 80px 60px 80px;padding:8px;border-bottom:1px solid var(--border);gap:8px;align-items:center}
.crow:last-child{border-bottom:none}
.twrap{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.thead{display:grid;padding:8px 1rem;background:var(--bg3);font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--text3);gap:10px;align-items:center}
.trow{display:grid;padding:10px 1rem;border-top:1px solid var(--border);gap:10px;align-items:center;transition:background .1s}
.trow:hover{background:var(--bg3)}
.t-dash .thead,.t-dash .trow{grid-template-columns:2.5fr 1fr 80px 90px}
.t-inv .thead,.t-inv .trow{grid-template-columns:36px 100px 2fr 70px 90px 60px 55px 75px 70px}
.t-ctrl .thead,.t-ctrl .trow{grid-template-columns:2fr 100px 130px 100px}
.t-ing .thead,.t-ing .trow{grid-template-columns:110px 2fr 110px 1fr}
.pname{display:block;font-size:13px;font-weight:500}
.pdesc{display:block;font-size:11px;color:var(--text3);margin-top:2px}
.mono{font-family:'DM Mono',monospace;font-size:13px}
.mono small{font-size:10px;color:var(--text2)}
.chip{font-size:11px;background:var(--bg4);padding:3px 8px;border-radius:99px;color:var(--text2);display:inline-block}
.cbadge{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;font-size:11px;font-weight:600}
.cA{background:var(--red-dim);color:var(--red)}.cM{background:var(--amber-dim);color:var(--amber)}.cB{background:var(--green-dim);color:var(--green)}
.row-actions{display:flex;gap:2px;align-items:center}
.bdel{background:transparent;color:var(--text3);padding:4px 6px;border-radius:4px;font-size:11px;line-height:1}
.bdel:hover{background:var(--red-dim);color:var(--red)}
.bedit{background:transparent;color:var(--text3);padding:4px 6px;border-radius:4px;font-size:11px;line-height:1}
.bedit:hover{background:var(--blue-dim);color:var(--blue)}
.empty{padding:2rem;text-align:center;color:var(--text3);font-size:13px}
.fcard{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius);padding:1.25rem;margin-bottom:1.25rem}
.ftitle{font-size:14px;font-weight:500;margin-bottom:1rem}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1rem}
.s2{grid-column:span 2}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--text2)}
.factions{display:flex;gap:8px}
.filters{display:flex;gap:10px;align-items:center;margin-bottom:1rem;flex-wrap:wrap}
.search{min-width:180px;max-width:260px;flex:1}
.tabs{display:flex;gap:3px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:3px;flex-wrap:wrap}
.tab{background:transparent;color:var(--text2);padding:4px 10px;border-radius:4px;font-size:12px}
.tab:hover{color:var(--text)}.tab.on{background:var(--bg4);color:var(--text)}
.bp{background:var(--green);color:#000;font-weight:500;padding:8px 16px;border-radius:var(--radius-sm)}
.bp:hover{opacity:.85}.bp:disabled{opacity:.5;cursor:not-allowed}
.bs{background:var(--bg3);color:var(--text);border:1px solid var(--border2);padding:8px 16px;border-radius:var(--radius-sm)}
.bs:hover{background:var(--bg4)}
.clist{display:none}
.pcard{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:12px;margin-bottom:8px}
.pcard.ccritico{border-left:3px solid var(--red)}.pcard.calerta{border-left:3px solid var(--amber)}.pcard.cstock{border-left:3px solid var(--green)}
.ctop{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:10px}
.cbot{display:flex;justify-content:space-between;align-items:center}
.sval{font-size:22px;font-weight:500;font-family:'DM Mono',monospace}
.fab{position:fixed;bottom:80px;right:20px;width:52px;height:52px;border-radius:50%;background:var(--green);color:#000;font-size:22px;font-weight:700;display:flex;align-items:center;justify-content:center;z-index:90;box-shadow:0 4px 16px rgba(0,201,125,.3)}
.fab:hover{transform:scale(1.05)}
.modal{position:fixed;bottom:90px;right:16px;width:320px;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius);padding:1.25rem;z-index:95;box-shadow:0 8px 32px rgba(0,0,0,.5)}
.mtitle{font-size:14px;font-weight:500;margin-bottom:1rem}
.mform{display:flex;flex-direction:column;gap:10px;margin-bottom:1rem}
.mrow{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.mactions{display:flex;gap:8px}
.smsg{border-radius:var(--radius-sm);padding:8px 14px;font-size:13px;margin-bottom:1rem}
.smsg.ok{background:var(--green-dim);color:var(--green);border:1px solid rgba(0,201,125,.2)}
.smsg.err{background:var(--red-dim);color:var(--red);border:1px solid rgba(255,80,80,.2)}
.cfgcard{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:1rem 1.25rem;margin-bottom:1.25rem}
.cfgrow{display:flex;gap:1.5rem;align-items:flex-end;flex-wrap:wrap}
.hint{font-size:12px;color:var(--text3);margin-left:auto;align-self:center}
.hint strong{color:var(--text2)}
.cinput{width:100px;font-family:'DM Mono',monospace;font-size:14px;text-align:center;font-weight:500}
.dn{font-family:'DM Mono',monospace;font-size:13px;font-weight:500;color:var(--red)}
.dp{font-family:'DM Mono',monospace;font-size:13px;font-weight:500;color:var(--green)}
.dz{font-family:'DM Mono',monospace;font-size:13px;color:var(--text3)}
.foot{display:flex;justify-content:flex-end;align-items:center;gap:1rem;margin-bottom:2rem}
.qitem{display:flex;align-items:center;gap:1rem;padding:10px 1rem;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:4px}
.ptabs{display:flex;gap:4px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:3px;margin-bottom:1.25rem;width:fit-content}
.ptab{background:transparent;color:var(--text2);padding:6px 14px;border-radius:4px;font-size:13px}
.ptab:hover{color:var(--text)}.ptab.on{background:var(--bg4);color:var(--text);font-weight:500}
.chcard{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;margin-bottom:1rem}
.chtitle{font-size:12px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:.04em;margin-bottom:1rem}
.chrow{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem}
.legend{display:flex;gap:12px;font-size:11px;color:var(--text2)}
.ldot{width:10px;height:3px;border-radius:2px;display:inline-block;margin-right:4px}
.nodata{padding:2rem;text-align:center;color:var(--text3);font-size:13px}
.csrow{display:flex;align-items:center;gap:1rem;margin-bottom:1.25rem;flex-wrap:wrap}
.vs{font-size:14px;font-weight:500;color:var(--text3);padding-top:18px}
.ctab{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-top:1rem}
.cthead{display:grid;grid-template-columns:2fr 80px 80px 80px;padding:8px 1rem;background:var(--bg3);font-size:10px;text-transform:uppercase;color:var(--text3);gap:8px}
.ctrow{display:grid;grid-template-columns:2fr 80px 80px 80px;padding:10px 1rem;border-top:1px solid var(--border);gap:8px;align-items:center}
.ctrow:hover{background:var(--bg3)}
.iempty{padding:3rem 2rem;text-align:center;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius)}
.iicon{font-size:32px;display:block;margin-bottom:1rem;color:var(--text3)}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:1rem}
.spinner{width:32px;height:32px;border:3px solid var(--border2);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* SVG CHARTS */
.svg-chart{width:100%;overflow:visible}
.chart-wrap{width:100%;overflow-x:auto}
@media(max-width:768px){
  .app{flex-direction:column;height:100dvh}
  .sidebar{display:none}
  .main{flex:1;overflow-y:auto;padding-bottom:70px}
  .bottom-nav{display:flex;position:fixed;bottom:0;left:0;right:0;height:60px;background:var(--bg2);border-top:1px solid var(--border);align-items:center;justify-content:space-around;z-index:100}
  .bnbtn{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;padding:6px 4px;background:transparent;color:var(--text3);position:relative}
  .bnbtn.on .bnico,.bnbtn.on .bnlbl{color:var(--green)}
  .bnico{font-size:18px;color:var(--text3)}.bnlbl{font-size:9px;color:var(--text3)}
  .bnbadge{position:absolute;top:2px;right:calc(50% - 18px);background:var(--red);color:#fff;font-size:7px;width:13px;height:13px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600}
  .metrics{grid-template-columns:repeat(2,1fr);gap:8px}
  .metrics3{grid-template-columns:repeat(2,1fr)}
  .mv{font-size:22px}
  .fgrid{grid-template-columns:1fr}.s2{grid-column:span 1}
  .twrap{display:none}.clist{display:block}
  .fab{bottom:70px}
  .modal{left:12px;right:12px;width:auto;bottom:70px}
  .t-ctrl .thead,.t-ctrl .trow{grid-template-columns:1fr 80px 100px}
  .t-ctrl .thead span:nth-child(4),.t-ctrl .trow span:nth-child(4){display:none}
  .foot{flex-direction:column;align-items:stretch}
  .bpsave{width:100%;text-align:center;padding:12px;font-size:15px}
  .ptabs{width:100%}.ptab{flex:1;text-align:center;font-size:12px}
  .t-ing .thead,.t-ing .trow{grid-template-columns:90px 1fr 90px}
  .t-ing .thead span:last-child,.t-ing .trow span:last-child{display:none}
  .chead{grid-template-columns:2fr 60px 50px 60px}.crow{grid-template-columns:2fr 60px 50px 60px}
  .page{padding:1rem}
}
</style>
</head>

// ── STORE ──
const Ctx=createContext(null);
function Store({user,userName,onLogout,children}){
  const [products,setProducts]=useState([]);
  const [quincenas,setQuincenas]=useState([]);
  const [qItems,setQItems]=useState([]);
  const [ingresos,setIngresos]=useState([]);
  const [loading,setLoading]=useState(true);
  const [error,setError]=useState(null);

  const load=useCallback(async()=>{
    try{
      const [p,q,qi,i]=await Promise.all([
        sb.from('products').select('*').order('id'),
        sb.from('quincenas').select('*').order('fecha'),
        sb.from('quincena_items').select('*'),
        sb.from('ingresos').select('*').order('fecha',{ascending:false}),
      ]);
      if(p.error)throw p.error;
      setProducts(p.data||[]);
      setQuincenas(q.data||[]);
      setQItems(qi.data||[]);
      setIngresos(i.data||[]);
    }catch(e){setError(e.message);}
    setLoading(false);
  },[]);

  useEffect(()=>{load();},[load]);

  const quincenasWithInv=quincenas.map(q=>{
    const inv={};
    qItems.filter(i=>i.quincena_id===q.id).forEach(i=>{inv[i.product_id]=i.cantidad;});
    return{...q,inventario:inv};
  });

  function getStock(pid){
    if(!quincenasWithInv.length)return 0;
    const u=[...quincenasWithInv].sort((a,b)=>new Date(b.fecha)-new Date(a.fecha))[0];
    const base=u.inventario[pid]??0;
    const ing=ingresos.filter(i=>i.product_id===pid&&new Date(i.fecha)>=new Date(u.fecha)).reduce((s,i)=>s+i.cantidad,0);
    return base+ing;
  }
  function getConsumo(pid){
    if(quincenasWithInv.length<2)return 0;
    const s=[...quincenasWithInv].sort((a,b)=>new Date(a.fecha)-new Date(b.fecha));
    const cs=[];
    for(let i=1;i<s.length;i++){
      const p=s[i-1].inventario[pid]??0,c=s[i].inventario[pid]??0;
      const ing=ingresos.filter(x=>x.product_id===pid&&new Date(x.fecha)>=new Date(s[i-1].fecha)&&new Date(x.fecha)<new Date(s[i].fecha)).reduce((t,x)=>t+x.cantidad,0);
      const v=p+ing-c;if(v>0)cs.push(v);
    }
    return cs.length?Math.round(cs.reduce((a,b)=>a+b)/cs.length):0;
  }
  function getDias(pid){const c=getConsumo(pid);if(!c)return 999;return Math.round((getStock(pid)/c)*15)}
  function getEstado(pid){const d=getDias(pid);return d<=10?'critico':d<=20?'alerta':'stock'}
  function getLista(){
    return products.filter(p=>getEstado(p.id)!=='stock').map(p=>{
      const stock=getStock(p.id),consumo=getConsumo(p.id);
      return{...p,stock,consumo,pedir:Math.max(0,consumo*2-stock),dias:getDias(p.id),estado:getEstado(p.id)};
    }).sort((a,b)=>a.dias-b.dias);
  }
  async function addProd(d){const {error}=await sb.from('products').insert([d]);if(error)return error.message;await load();return null;}
  async function updateProd(id,d){const {error}=await sb.from('products').update(d).eq('id',id);if(error)return error.message;await load();return null;}
  async function delProd(id){if(!confirm('¿Eliminar este producto? Se perderá su historial.'))return;await sb.from('products').delete().eq('id',id);await load();}
  async function addQ(label,fecha,inv){
    const {data,error}=await sb.from('quincenas').insert([{label,fecha}]).select().single();
    if(error)return error.message;
    const items=Object.entries(inv).map(([pid,cantidad])=>({quincena_id:data.id,product_id:parseInt(pid),cantidad}));
    if(items.length){const {error:e2}=await sb.from('quincena_items').insert(items);if(e2)return e2.message;}
    await load();return null;
  }
  async function updateQ(qid,inv){
    await sb.from('quincena_items').delete().eq('quincena_id',qid);
    const items=Object.entries(inv).map(([pid,cantidad])=>({quincena_id:qid,product_id:parseInt(pid),cantidad}));
    if(items.length){const {error}=await sb.from('quincena_items').insert(items);if(error)return error.message;}
    await load();return null;
  }
  async function addIng(pid,cant,fecha,nota){const {error}=await sb.from('ingresos').insert([{product_id:parseInt(pid),cantidad:parseInt(cant),fecha,nota}]);if(error)return error.message;await load();return null;}
  function dl(rows,name){const csv=rows.map(r=>r.map(c=>`"${c}"`).join(',')).join('\n');const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);a.download=`${name}-${new Date().toISOString().slice(0,10)}.csv`;a.click();}
  function csvInventario(){const rows=[['Criticidad','Código','Nombre','Flujo','Unidad','Stock','Días','Estado']];products.forEach(p=>{const e=getEstado(p.id);rows.push([p.criticidad,p.codigo,p.nombre,p.flujo,p.unidad,getStock(p.id),getDias(p.id)===999?'Sin hist.':getDias(p.id),e==='critico'?'Crítico':e==='alerta'?'Alerta':'En stock'])});dl(rows,'inventario');}
  function csvLista(){const rows=[['Código','Nombre','Stock','Consume/Q','Pedir','Unidad','Días']];getLista().forEach(p=>rows.push([p.codigo,p.nombre,p.stock,p.consumo,p.pedir,p.unidad,p.dias]));dl(rows,'lista-compra');}
  return <Ctx.Provider value={{products,quincenas:quincenasWithInv,ingresos,loading,error,userName,onLogout,getStock,getConsumo,getDias,getEstado,getLista,addProd,updateProd,delProd,addQ,updateQ,addIng,csvInventario,csvLista}}>{children}</Ctx.Provider>;
}
const useApp=()=>useContext(Ctx);

// ── HELPERS ──
function DBadge({d}){const c=d<=10?'r':d<=20?'a':'g';return <span className={`dbadge ${c}`}>{d===999?'—':`${d}d`}</span>}
function Barra({d}){const p=Math.min(100,Math.round(d/30*100)),col=d<=10?'#ff5050':d<=20?'#f0a500':'#00c97d';return <div className="bwrap"><div className="bfill" style={{width:`${p}%`,background:col}}/></div>}
const lbl=e=>e==='critico'?'Crítico':e==='alerta'?'Alerta':'En stock';
function Msg({text,type}){return text?<div className={`smsg ${type||'ok'}`}>{text}</div>:null}

// ── SVG BAR CHART ──
function BarChartSVG({data,color='#00c97d',height=160}){
  if(!data||!data.length)return <div className="nodata">Sin datos suficientes</div>;
  const max=Math.max(...data.map(d=>d.v),1);
  const W=500,H=height,pad={l:36,r:10,t:10,b:28};
  const cW=W-pad.l-pad.r,cH=H-pad.t-pad.b;
  const bW=Math.min(36,cW/data.length*0.6);
  const gap=cW/data.length;
  return(
    <div className="chart-wrap">
      <svg viewBox={`0 0 ${W} ${H}`} className="svg-chart" style={{height}}>
        {[0,.25,.5,.75,1].map(t=>{
          const y=pad.t+cH*(1-t);
          return <g key={t}>
            <line x1={pad.l} y1={y} x2={W-pad.r} y2={y} stroke="rgba(255,255,255,0.05)" strokeWidth="1"/>
            <text x={pad.l-4} y={y+4} textAnchor="end" fontSize="9" fill="#555">{Math.round(max*t)}</text>
          </g>;
        })}
        {data.map((d,i)=>{
          const x=pad.l+gap*i+gap/2;
          const bH=Math.max(2,(d.v/max)*cH);
          const y=pad.t+cH-bH;
          return <g key={i}>
            <rect x={x-bW/2} y={y} width={bW} height={bH} fill={color} opacity="0.85" rx="3"/>
            <text x={x} y={H-pad.b+14} textAnchor="middle" fontSize="9" fill="#555">{d.q}</text>
            <text x={x} y={y-4} textAnchor="middle" fontSize="9" fill="#888">{d.v}</text>
          </g>;
        })}
      </svg>
    </div>
  );
}

// ── SVG LINE CHART ──
function LineChartSVG({data,height=180}){
  if(!data||data.length<2)return <div className="nodata">Sin datos suficientes</div>;
  const allVals=[...data.map(d=>d.r).filter(v=>v!=null),...data.map(d=>d.p).filter(v=>v!=null)];
  const max=Math.max(...allVals,1);
  const W=500,H=height,pad={l:40,r:10,t:10,b:28};
  const cW=W-pad.l-pad.r,cH=H-pad.t-pad.b;
  const xp=(i)=>pad.l+i*(cW/(data.length-1));
  const yp=(v)=>pad.t+cH*(1-v/max);
  const realPts=data.map((d,i)=>d.r!=null?`${xp(i)},${yp(d.r)}`:null).filter(Boolean);
  const projPts=data.map((d,i)=>d.p!=null?`${xp(i)},${yp(d.p)}`:null).filter(Boolean);
  return(
    <div className="chart-wrap">
      <svg viewBox={`0 0 ${W} ${H}`} className="svg-chart" style={{height}}>
        {[0,.25,.5,.75,1].map(t=>{
          const y=pad.t+cH*(1-t);
          return <g key={t}>
            <line x1={pad.l} y1={y} x2={W-pad.r} y2={y} stroke="rgba(255,255,255,0.05)" strokeWidth="1"/>
            <text x={pad.l-4} y={y+4} textAnchor="end" fontSize="9" fill="#555">{Math.round(max*t)}</text>
          </g>;
        })}
        {realPts.length>1&&<polyline points={realPts.join(' ')} fill="none" stroke="#00c97d" strokeWidth="2" strokeLinejoin="round"/>}
        {projPts.length>1&&<polyline points={projPts.join(' ')} fill="none" stroke="#4d9eff" strokeWidth="2" strokeDasharray="6,4" strokeLinejoin="round"/>}
        {data.map((d,i)=><g key={i}>
          {d.r!=null&&<circle cx={xp(i)} cy={yp(d.r)} r="4" fill="#00c97d"/>}
          {d.p!=null&&<circle cx={xp(i)} cy={yp(d.p)} r="3.5" fill="#0f0f0f" stroke="#4d9eff" strokeWidth="2"/>}
          <text x={xp(i)} y={H-pad.b+14} textAnchor="middle" fontSize="9" fill="#555">{d.q}</text>
        </g>)}
      </svg>
    </div>
  );
}

function Inventario(){
  const {products,getStock,getDias,getEstado,addProd,updateProd,delProd,addIng}=useApp();
  const [bus,setBus]=useState('');const [fil,setFil]=useState('Todos');
  const [sf,setSf]=useState(false);const [si,setSi]=useState(false);
  const [editId,setEditId]=useState(null);
  const empty={criticidad:'Alto',codigo:'',nombre:'',descripcion:'',flujo:'',unidad:'',conversion:'',stockInicial:''};
  const [form,setForm]=useState(empty);
  const [ing,setIng]=useState({productoId:'',cantidad:'',fecha:new Date().toISOString().slice(0,10),nota:''});
  const [msg,setMsg]=useState({text:'',type:'ok'});
  const [saving,setSaving]=useState(false);
  const flujos=['Todos',...new Set(products.map(p=>p.flujo).filter(Boolean))];
  const filtered=products.filter(p=>{
    const mf=fil==='Todos'||p.flujo.toLowerCase()===fil.toLowerCase();
    const mb=!bus||p.nombre.toLowerCase().includes(bus.toLowerCase())||p.codigo.toLowerCase().includes(bus.toLowerCase());
    return mf&&mb;
  });
  function showMsg(t,type='ok'){setMsg({text:t,type});setTimeout(()=>setMsg({text:'',type:'ok'}),3000)}
  function openEdit(p){setEditId(p.id);setForm({criticidad:p.criticidad,codigo:p.codigo,nombre:p.nombre,descripcion:p.descripcion||'',flujo:p.flujo||'',unidad:p.unidad||'',conversion:p.conversion||'',stockInicial:''});setSf(true);setSi(false);}
  function openNew(){setEditId(null);setForm(empty);setSf(v=>!v);setSi(false);}
  async function saveProd(){
    if(!form.codigo||!form.nombre)return;setSaving(true);
    if(editId){
      const err=await updateProd(editId,{criticidad:form.criticidad,codigo:form.codigo,nombre:form.nombre,descripcion:form.descripcion,flujo:form.flujo,unidad:form.unidad,conversion:form.conversion});
      err?showMsg(err,'err'):(setSf(false),setEditId(null),showMsg('Producto actualizado ✓'));
    }else{
      const err=await addProd({criticidad:form.criticidad,codigo:form.codigo,nombre:form.nombre,descripcion:form.descripcion,flujo:form.flujo,unidad:form.unidad,conversion:form.conversion});
      err?showMsg(err,'err'):(setForm(empty),setSf(false),showMsg('Producto guardado ✓'));
    }
    setSaving(false);
  }
  async function saveIng(){
    if(!ing.productoId||!ing.cantidad||parseInt(ing.cantidad)<=0)return;setSaving(true);
    const err=await addIng(ing.productoId,ing.cantidad,ing.fecha,ing.nota);
    err?showMsg(err,'err'):(setIng({productoId:'',cantidad:'',fecha:new Date().toISOString().slice(0,10),nota:''}),setSi(false),showMsg('Ingreso registrado ✓'));
    setSaving(false);
  }
  return <div className="page" style={{position:'relative'}}>
    <div className="ph">
      <div><h1 className="pt">Inventario</h1><p className="ps">{products.length} productos</p></div>
      <button className="bp" onClick={openNew}>{sf&&!editId?'Cancelar':'+ Nuevo producto'}</button>
    </div>
    <Msg text={msg.text} type={msg.type}/>
    {sf&&<div className="fcard" style={{borderColor:editId?'rgba(77,158,255,0.3)':'var(--border2)'}}>
      <div className="ftitle">{editId?'✏️ Editar producto':'Nuevo producto'}</div>
      <div className="fgrid">
        <div className="field"><label>Criticidad</label><select value={form.criticidad} onChange={e=>setForm(f=>({...f,criticidad:e.target.value}))}><option>Alto</option><option>Medio</option><option>Bajo</option></select></div>
        <div className="field"><label>Código *</label><input value={form.codigo} onChange={e=>setForm(f=>({...f,codigo:e.target.value}))} placeholder="P12345"/></div>
        <div className="field s2"><label>Nombre *</label><input value={form.nombre} onChange={e=>setForm(f=>({...f,nombre:e.target.value}))} placeholder="Nombre del producto"/></div>
        <div className="field s2"><label>Descripción</label><input value={form.descripcion} onChange={e=>setForm(f=>({...f,descripcion:e.target.value}))} placeholder="Descripción"/></div>
        <div className="field"><label>Flujo</label><input value={form.flujo} onChange={e=>setForm(f=>({...f,flujo:e.target.value}))} placeholder="Vans, Masterbox..."/></div>
        <div className="field"><label>Unidad</label><input value={form.unidad} onChange={e=>setForm(f=>({...f,unidad:e.target.value}))} placeholder="Rollo, Unid..."/></div>
        <div className="field"><label>Conversión</label><input value={form.conversion} onChange={e=>setForm(f=>({...f,conversion:e.target.value}))} placeholder="Rollo x 100 Etiq"/></div>
        {!editId&&<div className="field"><label>Stock inicial</label><input type="number" min="0" value={form.stockInicial} onChange={e=>setForm(f=>({...f,stockInicial:e.target.value}))} placeholder="0"/></div>}
      </div>
      <div className="factions">
        <button className="bp" onClick={saveProd} disabled={saving}>{saving?'Guardando...':(editId?'Guardar cambios':'Guardar producto')}</button>
        <button className="bs" onClick={()=>{setSf(false);setEditId(null);}}>Cancelar</button>
      </div>
    </div>}
    <div className="filters">
      <input className="search" value={bus} onChange={e=>setBus(e.target.value)} placeholder="Buscar..."/>
      <div className="tabs">{flujos.map(f=><button key={f} className={`tab${fil===f?' on':''}`} onClick={()=>setFil(f)}>{f}</button>)}</div>
    </div>
    <div className="twrap t-inv">
      <div className="thead"><span>Crit.</span><span>Código</span><span>Nombre</span><span>Flujo</span><span>Unidad</span><span>Stock</span><span>Días</span><span>Estado</span><span>Acc.</span></div>
      {filtered.map(p=>{const s=getStock(p.id),d=getDias(p.id),e=getEstado(p.id);return(
        <div key={p.id} className="trow">
          <span><span className={`cbadge c${p.criticidad[0]}`}>{p.criticidad[0]}</span></span>
          <span className="mono" style={{fontSize:11,color:'var(--text2)'}}>{p.codigo}</span>
          <span><span className="pname">{p.nombre}</span><span className="pdesc">{p.descripcion}</span></span>
          <span><span className="chip">{p.flujo}</span></span>
          <span><span className="pname">{p.unidad}</span><span className="pdesc">{p.conversion}</span></span>
          <span className={`mono ${e}`}>{s}</span>
          <span className="mono">{d===999?'—':`${d}d`}</span>
          <span><span className={`badge ${e}`}>{lbl(e)}</span></span>
          <span className="row-actions">
            <button className="bedit" title="Editar" onClick={()=>openEdit(p)}>✏️</button>
            <button className="bdel" title="Eliminar" onClick={()=>delProd(p.id)}>✕</button>
          </span>
        </div>
      );})}
      {!filtered.length&&<div className="empty">No se encontraron productos</div>}
    </div>
    <div className="clist">
      {filtered.map(p=>{const s=getStock(p.id),d=getDias(p.id),e=getEstado(p.id);return(
        <div key={p.id} className={`pcard c${e}`}>
          <div className="ctop">
            <div><span className="pname">{p.nombre}</span><span className="pdesc">{p.codigo} · {p.flujo}</span></div>
            <div style={{display:'flex',alignItems:'center',gap:4}}>
              <span className={`badge ${e}`}>{lbl(e)}</span>
              <button className="bedit" onClick={()=>openEdit(p)}>✏️</button>
            </div>
          </div>
          <div className="cbot"><div style={{display:'flex',alignItems:'baseline',gap:4}}><span className={`sval ${e}`}>{s}</span><span style={{fontSize:11,color:'var(--text2)'}}> {p.unidad}s</span></div><span style={{fontSize:11,color:'var(--text2)'}}>{d===999?'Sin historial':`~${d} días`}</span></div>
        </div>
      );})}
      {!filtered.length&&<div className="empty">No se encontraron productos</div>}
    </div>
    <button className="fab" onClick={()=>{setSi(v=>!v);setSf(false);setEditId(null);}}>{si?'✕':'↑'}</button>
    {si&&<div className="modal">
      <div className="mtitle">Registrar ingreso</div>
      <div className="mform">
        <div className="field"><label>Producto *</label><select value={ing.productoId} onChange={e=>setIng(f=>({...f,productoId:e.target.value}))}><option value="">Seleccionar...</option>{products.map(p=><option key={p.id} value={p.id}>{p.nombre}</option>)}</select></div>
        <div className="mrow">
          <div className="field"><label>Cantidad *</label><input type="number" min="1" value={ing.cantidad} onChange={e=>setIng(f=>({...f,cantidad:e.target.value}))} placeholder="0"/></div>
          <div className="field"><label>Fecha</label><input type="date" value={ing.fecha} onChange={e=>setIng(f=>({...f,fecha:e.target.value}))}/></div>
        </div>
        <div className="field"><label>Nota</label><input value={ing.nota} onChange={e=>setIng(f=>({...f,nota:e.target.value}))} placeholder="Proveedor..."/></div>
      </div>
      <div className="mactions"><button className="bp" onClick={saveIng} disabled={saving}>{saving?'Guardando...':'Registrar'}</button><button className="bs" onClick={()=>setSi(false)}>Cancelar</button></div>
    </div>}
  </div>;
}

// ── CONTROL ──
function Control(){
  const {products,quincenas,addQ,updateQ,getStock}=useApp();
  const hoy=new Date().toISOString().slice(0,10);
  const m=new Date().getDate()<=15?1:2,mes=new Date().toLocaleString('es',{month:'short'});
  const [label,setLabel]=useState(`Q${m} ${mes[0].toUpperCase()+mes.slice(1)}`);
  const [fecha,setFecha]=useState(hoy);
  const [counts,setCounts]=useState({});
  const [msg,setMsg]=useState({text:'',type:'ok'});
  const [saving,setSaving]=useState(false);
  const [editQ,setEditQ]=useState(null);
  const uq=quincenas.length?[...quincenas].sort((a,b)=>new Date(b.fecha)-new Date(a.fecha))[0]:null;

  function openEditQ(q){
    setEditQ(q);
    const c={};Object.entries(q.inventario).forEach(([k,v])=>{c[k]=v;});
    setCounts(c);
  }
  function cancelEdit(){setEditQ(null);setCounts({});}

  async function guardar(){
    setSaving(true);
    const inv={};products.forEach(p=>{const v=counts[p.id];inv[p.id]=v!==undefined&&v!==''?parseInt(v):getStock(p.id);});
    let err;
    if(editQ){err=await updateQ(editQ.id,inv);}
    else{err=await addQ(label,fecha,inv);}
    if(err){setMsg({text:err,type:'err'});}
    else{setMsg({text:editQ?'Control actualizado ✓':'Control guardado ✓',type:'ok'});setCounts({});setEditQ(null);}
    setTimeout(()=>setMsg({text:'',type:'ok'}),3000);
    setSaving(false);
  }

  const ref=uq&&!editQ?uq:null;
  return <div className="page">
    <div className="ph"><div><h1 className="pt">Control</h1><p className="ps">{editQ?`Editando: ${editQ.label}`:'Solo ingresa el stock contado. Vacíos mantienen valor anterior.'}</p></div></div>
    <div className="cfgcard">
      <div className="cfgrow">
        {!editQ&&<><div className="field" style={{minWidth:0}}><label>Etiqueta</label><input value={label} onChange={e=>setLabel(e.target.value)} style={{width:130}}/></div>
        <div className="field" style={{minWidth:0}}><label>Fecha</label><input type="date" value={fecha} onChange={e=>setFecha(e.target.value)} style={{width:155}}/></div></>}
        {editQ&&<span style={{fontSize:13,fontWeight:500}}>Editando conteo de <strong style={{color:'var(--green)'}}>{editQ.label}</strong></span>}
        {ref&&<span className="hint">Último: <strong>{ref.label}</strong></span>}
      </div>
    </div>
    <Msg text={msg.text} type={msg.type}/>
    <div className="twrap t-ctrl">
      <div className="thead"><span>Producto</span><span>Anterior</span><span>Conteo</span><span>Diferencia</span></div>
      {products.map(p=>{
        const ant=ref?(ref.inventario[p.id]??'—'):'—';
        const con=counts[p.id];
        const diff=con!==undefined&&con!==''&&ant!=='—'?parseInt(con)-parseInt(ant):null;
        return <div key={p.id} className="trow">
          <span><span className="pname">{p.nombre}</span><span className="pdesc">{p.unidad} · {p.flujo}</span></span>
          <span className="mono" style={{fontSize:15,fontWeight:500}}>{editQ?(editQ.inventario[p.id]??'—'):ant}</span>
          <span><input type="number" min="0" placeholder={editQ?(editQ.inventario[p.id]??'0'):ant!=='—'?String(ant):'0'} value={counts[p.id]??''} onChange={e=>setCounts(v=>({...v,[p.id]:e.target.value}))} className="cinput"/></span>
          <span>{diff!==null?<span className={diff<0?'dn':diff>0?'dp':'dz'}>{diff>0?'+':''}{diff}</span>:<span className="dz">—</span>}</span>
        </div>;
      })}
    </div>
    <div className="foot">
      {editQ&&<button className="bs" onClick={cancelEdit}>Cancelar edición</button>}
      <button className="bp bpsave" onClick={guardar} disabled={saving}>{saving?'Guardando...':(editQ?`Actualizar ${editQ.label}`:`Guardar conteo de ${label}`)}</button>
    </div>
    {quincenas.length>0&&<div>
      <div className="stitle" style={{marginBottom:'.75rem'}}>Historial de controles</div>
      {[...quincenas].sort((a,b)=>new Date(b.fecha)-new Date(a.fecha)).map(q=>(
        <div key={q.id} className="qitem">
          <span style={{fontWeight:500,fontSize:13,minWidth:70}}>{q.label}</span>
          <span style={{fontSize:12,color:'var(--text2)'}}>{new Date(q.fecha).toLocaleDateString('es',{day:'2-digit',month:'short',year:'numeric'})}</span>
          <span style={{fontSize:12,color:'var(--text3)',marginLeft:'auto'}}>{Object.keys(q.inventario).length} productos</span>
          <button className="bedit" style={{marginLeft:8}} title="Editar este conteo" onClick={()=>openEditQ(q)}>✏️</button>
        </div>
      ))}
    </div>}
  </div>;
}

// ── INGRESOS ──
function Ingresos(){
  const {products,ingresos}=useApp();
  const sorted=[...ingresos].sort((a,b)=>new Date(b.fecha)-new Date(a.fecha));
  return <div className="page">
    <div className="ph"><div><h1 className="pt">Ingresos</h1><p className="ps">Historial · Registra ingresos con el botón <strong style={{color:'var(--green)'}}>↑</strong> en Inventario</p></div></div>
    {!sorted.length?<div className="iempty"><span className="iicon">↑</span><p style={{fontSize:13,color:'var(--text2)',marginBottom:6}}>No hay ingresos registrados.</p><p style={{fontSize:13,color:'var(--text2)'}}>Ve a <strong style={{color:'var(--green)'}}>Inventario</strong> y usa el botón flotante ↑</p></div>
    :<div className="twrap t-ing">
      <div className="thead"><span>Fecha</span><span>Producto</span><span>Cantidad</span><span>Nota</span></div>
      {sorted.map(i=>{const p=products.find(x=>x.id===i.product_id);return(
        <div key={i.id} className="trow">
          <span style={{fontSize:12,color:'var(--text2)'}}>{new Date(i.fecha).toLocaleDateString('es',{day:'2-digit',month:'short',year:'numeric'})}</span>
          <span>{p?<><span className="pname">{p.nombre}</span><span className="pdesc">{p.codigo}</span></>:<span className="pdesc">Eliminado</span>}</span>
          <span style={{display:'flex',alignItems:'baseline',gap:5}}><span className="mono cg">+{i.cantidad}</span><span style={{fontSize:11,color:'var(--text3)'}}>{p?.unidad}</span></span>
          <span style={{fontSize:12,color:'var(--text2)'}}>{i.nota||'—'}</span>
        </div>
      );})}
    </div>}
  </div>;
}

// ── GRÁFICOS ──
function Graficos(){
  const {products,quincenas,getStock,getConsumo,getDias,getEstado}=useApp();
  const [sid,setSid]=useState(products[0]?.id??null);
  const [tab,setTab]=useState('c');
  const sq=[...quincenas].sort((a,b)=>new Date(b.fecha)-new Date(a.fecha));
  const [qa,setQa]=useState(sq[0]?.id??null);
  const [qb,setQb]=useState(sq[1]?.id??null);
  const prod=products.find(p=>p.id===sid);
  const avg=getConsumo(sid),stock=getStock(sid),dias=getDias(sid),est=getEstado(sid);
  const qs=[...quincenas].sort((a,b)=>new Date(a.fecha)-new Date(b.fecha));
  const cd=[];for(let i=1;i<qs.length;i++){const p=qs[i-1].inventario[sid]??0,c=qs[i].inventario[sid]??0;cd.push({q:qs[i].label,v:Math.max(0,p-c)});}
  const sr=qs.map(q=>({q:q.label,s:q.inventario[sid]??0}));
  let s=stock;const py=['Próx.1','Próx.2','Próx.3','Próx.4'].map(l=>{s=Math.max(0,s-avg);return{q:l,p:s};});
  const comb=[...sr.slice(-3).map(d=>({q:d.q,r:d.s})),{q:py[0]?.q,r:stock,p:stock},...py.map(d=>({q:d.q,p:d.p}))];
  const qAobj=quincenas.find(q=>q.id===parseInt(qa)),qBobj=quincenas.find(q=>q.id===parseInt(qb));
  const comp=(qAobj&&qBobj)?products.map(p=>{
    const ca=Math.max(0,(qAobj.inventario[p.id]??0)-(qBobj.inventario[p.id]??0));
    const cb=getConsumo(p.id);const diff=ca===0?0:Math.round(((cb-ca)/ca)*100);
    return{n:p.nombre,ca,cb,diff};
  }):[];
  const td=comp.length?Math.round(comp.reduce((s,p)=>s+p.diff,0)/comp.length):0;
  return <div className="page">
    <div className="ph"><div><h1 className="pt">Gráficos</h1><p className="ps">Análisis de consumo y proyección</p></div></div>
    <div className="ptabs">
      <button className={`ptab${tab==='c'?' on':''}`} onClick={()=>setTab('c')}>Consumo y proyección</button>
      <button className={`ptab${tab==='k'?' on':''}`} onClick={()=>setTab('k')}>Comparativo</button>
    </div>
    {tab==='c'&&<>
      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:'1rem'}}>
        <label style={{fontSize:12,color:'var(--text2)'}}>Producto</label>
        <select value={sid??''} onChange={e=>setSid(parseInt(e.target.value))} style={{minWidth:220,width:'auto'}}>{products.map(p=><option key={p.id} value={p.id}>{p.nombre}</option>)}</select>
      </div>
      {prod&&<>
        <div className="metrics3">
          <div className="metric"><span className="ml">Stock actual</span><span className={`mv ${est}`}>{stock}<small style={{fontSize:12,fontWeight:400,color:'var(--text2)'}}> {prod.unidad}s</small></span></div>
          <div className="metric"><span className="ml">Consume prom/Q</span><span className="mv">{avg}<small style={{fontSize:12,fontWeight:400,color:'var(--text2)'}}> {prod.unidad}s</small></span></div>
          <div className="metric"><span className="ml">Días restantes</span><span className={`mv ${est}`}>{dias===999?'—':`${dias}d`}</span></div>
        </div>
        <div className="chcard">
          <div className="chtitle">Consumo por quincena</div>
          <BarChartSVG data={cd} color="#00c97d" height={160}/>
        </div>
        <div className="chcard">
          <div className="chrow">
            <div className="chtitle">Stock real vs proyección</div>
            <div className="legend"><span><span className="ldot" style={{background:'#00c97d'}}/>Real</span><span><span className="ldot" style={{background:'#4d9eff'}}/>Proyección</span></div>
          </div>
          <LineChartSVG data={comb} height={180}/>
        </div>
      </>}
    </>}
    {tab==='k'&&<>
      <div className="csrow">
        <div className="field"><label style={{fontSize:11,textTransform:'uppercase',letterSpacing:'.05em',color:'var(--text2)'}}>Quincena actual</label><select value={qa??''} onChange={e=>setQa(e.target.value)} style={{minWidth:150,width:'auto'}}>{sq.map(q=><option key={q.id} value={q.id}>{q.label}</option>)}</select></div>
        <span className="vs">vs</span>
        <div className="field"><label style={{fontSize:11,textTransform:'uppercase',letterSpacing:'.05em',color:'var(--text2)'}}>Quincena anterior</label><select value={qb??''} onChange={e=>setQb(e.target.value)} style={{minWidth:150,width:'auto'}}>{sq.map(q=><option key={q.id} value={q.id}>{q.label}</option>)}</select></div>
      </div>
      {quincenas.length<2?<div className="nodata">Necesitas al menos 2 controles registrados</div>:<>
        <div className="metrics3">
          <div className="metric"><span className="ml">Variación prom.</span><span className={`mv${td>0?' cr':td<0?' cg':''}`}>{td>0?'+':''}{td}%</span></div>
          <div className="metric"><span className="ml">Subieron</span><span className="mv cr">{comp.filter(p=>p.diff>0).length}</span></div>
          <div className="metric"><span className="ml">Bajaron</span><span className="mv cg">{comp.filter(p=>p.diff<0).length}</span></div>
        </div>
        <div className="ctab">
          <div className="cthead"><span>Producto</span><span>Anterior</span><span>Actual</span><span>Variación</span></div>
          {[...comp].sort((a,b)=>b.diff-a.diff).map((p,i)=>(
            <div key={i} className="ctrow">
              <span className="pname">{p.n}</span><span className="mono">{p.ca}</span><span className="mono">{p.cb}</span>
              <span className={`mono${p.diff>0?' cr':p.diff<0?' cg':''}`}>{p.diff>0?'+':''}{p.diff}%</span>
            </div>
          ))}
        </div>
      </>}
    </>}
  </div>;
}

// ── APP ROOT ──
const PAGES=[{id:'dashboard',label:'Dashboard',icon:'▦'},{id:'inventario',label:'Inventario',icon:'≡'},{id:'control',label:'Control',icon:'⊞'},{id:'ingresos',label:'Ingresos',icon:'↑'},{id:'graficos',label:'Gráficos',icon:'∿'}];

function AppMain({user,profile,onLogout}){
  const [page,setPage]=useState('dashboard');
  const userName=profile?.nombre||user.email;
  return(
    <Store user={user} userName={userName} onLogout={onLogout}>
      <AppInner page={page} setPage={setPage} onLogout={onLogout} userName={userName}/>
    </Store>
  );
}

function AppInner({page,setPage,onLogout,userName}){
  const {getEstado,products,csvInventario,loading,error}=useApp();
  const nc=products.filter(p=>getEstado(p.id)==='critico').length;
  if(loading)return <div className="loading"><div className="spinner"/><span style={{fontSize:13,color:'var(--text2)'}}>Cargando inventario...</span></div>;
  if(error)return <div className="loading"><span style={{fontSize:14,color:'var(--red)'}}>Error: {error}</span><button className="bs" style={{marginTop:8}} onClick={()=>window.location.reload()}>Reintentar</button></div>;
  return <div className="app">
    <aside className="sidebar">
      <div className="brand"><span className="brand-icon">⬡</span><span className="brand-name">Inventario</span></div>
      <nav className="nav">
        {PAGES.map(p=><button key={p.id} className={`nav-btn${page===p.id?' active':''}`} onClick={()=>setPage(p.id)}>
          <span className="nav-icon">{p.icon}</span><span>{p.label}</span>
          {p.id==='dashboard'&&nc>0&&<span className="nbadge">{nc}</span>}
        </button>)}
      </nav>
      <div className="sidebar-foot">
        <div className="user-info"><span className="user-dot"/><span style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{userName}</span></div>
        <button className="bexp" onClick={csvInventario}>↓ Exportar CSV</button>
        <button className="bexp" onClick={onLogout}>Cerrar sesión</button>
      </div>
    </aside>
    <main className="main">
      {page==='dashboard'&&<Dashboard/>}
      {page==='inventario'&&<Inventario/>}
      {page==='control'&&<Control/>}
      {page==='ingresos'&&<Ingresos/>}
      {page==='graficos'&&<Graficos/>}
    </main>
    <nav className="bottom-nav">
      {PAGES.map(p=><button key={p.id} className={`bnbtn${page===p.id?' on':''}`} onClick={()=>setPage(p.id)}>
        <div style={{position:'relative',display:'inline-block'}}>
          <span className="bnico">{p.icon}</span>
          {p.id==='dashboard'&&nc>0&&<span className="bnbadge">{nc}</span>}
        </div>
        <span className="bnlbl">{p.label}</span>
      </button>)}
    </nav>
  </div>;
}

function Root(){
  const [session,setSession]=useState(undefined);
  const [profile,setProfile]=useState(null);

  useEffect(()=>{
    sb.auth.getSession().then(({data:{session}})=>setSession(session));
    const {data:{subscription}}=sb.auth.onAuthStateChange((_,session)=>{setSession(session);if(!session)setProfile(null);});
    return()=>subscription.unsubscribe();
  },[]);

  useEffect(()=>{
    if(!session)return;
    sb.from('user_profiles').select('*').eq('id',session.user.id).single().then(({data})=>setProfile(data));
  },[session]);

  async function handleLogout(){await sb.auth.signOut();setSession(null);setProfile(null);}

  if(session===undefined)return <div className="loading"><div className="spinner"/></div>;
  if(!session)return <AuthScreen/>;
  if(!profile)return <div className="loading"><div className="spinner"/><span style={{fontSize:13,color:'var(--text2)'}}>Verificando acceso...</span></div>;
  if(profile.status!=='approved')return <PendingScreen onLogout={handleLogout}/>;
  return <AppMain user={session.user} profile={profile} onLogout={handleLogout}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<Root/>);
</script>
</body>
